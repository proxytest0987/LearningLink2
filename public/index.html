<!doctype html>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Bubble Proxy on Railway</title>
<style>
:root{--b:#1f2840;--t:#e9edff;--m:#a8b0d6}
body{margin:0;font-family:ui-sans-serif,-apple-system,system-ui,Segoe UI,Roboto,Helvetica,Arial;background:linear-gradient(180deg,#0b0f19,#0e1322);color:var(--t)}
.wrap{max-width:960px;margin:0 auto;padding:24px}
.card{border:1px solid var(--b);border-radius:18px;background:linear-gradient(180deg,#0f1526,#0b1020);padding:18px;box-shadow:0 12px 36px rgba(0,0,0,.4)}
h1{font-size:18px;margin:0 0 10px}
form{display:flex;gap:10px;flex-wrap:wrap}
input[type=text]{flex:1;min-width:240px;padding:12px 14px;border-radius:12px;border:1px solid var(--b);background:#0e1528;color:#fff}
button{padding:12px 14px;border:0;border-radius:12px;background:linear-gradient(135deg,#7a6cff,#ff79c6,#00e0ff);color:#0b0f19;font-weight:700;cursor:pointer}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.chip{padding:8px 10px;border-radius:999px;border:1px dashed var(--b);color:#e9edff;cursor:pointer;background:#11182a99}
small{color:var(--m)}
</style>
<div class="wrap"><div class="card">
  <h1>Bubble Proxy on Railway</h1>
  <form action="/go" method="post" onsubmit="return true">
    <input id="q" type="text" name="q" placeholder="URL または 検索語（例: https://example.com / 琵琶湖 観光）"/>
    <input type="hidden" name="engine" id="engine" value="ddg"/>
    <button type="submit">いってみる ✨</button>
  </form>
  <div class="chips">
    <div class="chip" onclick="setEngine('ddg', this)" data-eng="ddg">🦆 DuckDuckGo</div>
    <div class="chip" onclick="setEngine('startpg', this)" data-eng="startpg">🕶 Startpage</div>
    <div class="chip" onclick="setEngine('brave', this)" data-eng="brave">🦁 Brave</div>
    <div class="chip" onclick="setEngine('bing', this)" data-eng="bing">🌀 Bing</div>
    <div class="chip" onclick="setEngine('google', this)" data-eng="google">🅶 Google（β/止まるかも）</div>
  </div>
  <p><small>注: ログイン必須・DRM・厳格Bot対策サイトは動かない場合があります。</small></p>
</div></div>
<script>
function setEngine(code, el){
  document.getElementById('engine').value = code;
  document.querySelectorAll('.chip').forEach(c => c.style.outline = '');
  if(el) el.style.outline = '2px solid #7a6cff';
  if(code==='google'){ alert('GoogleはreCAPTCHA等で止まることがあります（必要なら直接開いてください）。'); }
}
setEngine('ddg', document.querySelector('.chip[data-eng="ddg"]'));
</script>
