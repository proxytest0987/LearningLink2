<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bubble Proxy — ぜんぶプロキシで</title>
  <meta name="theme-color" content="#7a6cff" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root{
      --bg:#0c0f1a; --panel:#0f1422; --glass:#11182a99;
      --text:#e9edff; --muted:#a8b0d6;
      --accent:#7a6cff; --accent2:#00e0ff; --accent3:#ff79c6;
      --border:#1f2840; --shadow: 0 12px 40px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font-family: ui-sans-serif,-apple-system,system-ui,Segoe UI,Roboto,Helvetica,Arial;
      color:var(--text);
      background:
        radial-gradient(900px 600px at 10% -10%, #7a6cff22, transparent 60%),
        radial-gradient(800px 500px at 110% 10%, #00e0ff22, transparent 55%),
        linear-gradient(180deg, #0b0f19, #0e1322);
      overflow-y: overlay;
    }
    header{padding:20px 16px}
    .wrap{max-width:980px;margin:0 auto}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:44px;height:44px}
    .titles h1{margin:0;font-size:20px;letter-spacing:.2px}
    .titles p{margin:4px 0 0;color:var(--muted);font-size:13px}

    main{padding:16px}
    .card{
      border:1px solid var(--border); border-radius:20px; padding:20px; background:linear-gradient(180deg,#0f1526,#0b1020);
      box-shadow:var(--shadow); position:relative; overflow:hidden;
    }
    .glow1,.glow2{
      position:absolute; filter:blur(60px); opacity:.35; transform:translateZ(0);
    }
    .glow1{top:-120px;left:-60px;width:260px;height:260px;background:#7a6cff}
    .glow2{bottom:-140px;right:-40px;width:280px;height:280px;background:#00e0ff}

    .hero{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .heroLeft{display:flex;align-items:center;gap:12px}
    .badge{font-size:12px;color:#141827;background:#9cf;border-radius:999px;padding:4px 8px;color:#0a0d18}
    .hero h2{margin:0;font-size:22px;letter-spacing:.2px}
    .by{color:var(--muted);font-size:13px}
    .by b{color:#fff}

    .form{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}
    input[type="text"]{
      flex:1;min-width:260px;padding:14px 16px;font-size:16px;color:var(--text);
      background:linear-gradient(180deg,#0e1528,#0a1020); border:1px solid var(--border); border-radius:14px; outline:none;
      transition: box-shadow .15s ease, border-color .15s ease;
    }
    input[type="text"]::placeholder{color:var(--muted)}
    input[type="text"]:focus{ border-color:#2e3b74; box-shadow:0 0 0 4px #7a6cff33 }

    button{
      padding:14px 18px;font-size:16px;border-radius:14px;border:0;cursor:pointer;
      background:linear-gradient(135deg, var(--accent), var(--accent3), var(--accent2));
      color:#0b0f19; font-weight:700; letter-spacing:.3px;
      box-shadow: 0 10px 24px rgba(122,108,255,.35); transition: transform .05s ease, box-shadow .15s ease;
    }
    button:hover{ box-shadow:0 12px 28px rgba(122,108,255,.5) }
    button:active{ transform: translateY(1px) }

    .chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .chip{
      padding:9px 12px;border-radius:12px;border:1px dashed var(--border);
      background:var(--glass); backdrop-filter: blur(8px);
      color:var(--text); font-size:13px; cursor:pointer;
    }

    .hint{margin-top:14px;color:var(--muted);font-size:13px;line-height:1.6}
    footer{text-align:center;color:var(--muted);font-size:12px;padding:22px}
    .sparkle{animation:pop .9s ease both}
    @keyframes pop{0%{transform:scale(.96);opacity:.4}70%{transform:scale(1.02);opacity:1}100%{transform:scale(1)}}
  </style>
</head>
<body>
  <header>
    <div class="wrap brand">
      <img class="logo" src="/favicon.svg" alt="logo">
      <div class="titles">
        <h1>Bubble Proxy</h1>
        <p>検索もリンクも、ぜんぶプロキシ経由で。</p>
      </div>
    </div>
  </header>

  <main>
    <div class="wrap">
      <section class="card sparkle">
        <div class="glow1" aria-hidden="true"></div>
        <div class="glow2" aria-hidden="true"></div>

        <div class="hero">
          <div class="heroLeft">
            <span class="badge">NEW</span>
            <h2>ネオンでかるく、使って速い。</h2>
          </div>
          <div class="by">made by <b>Haruki</b></div>
        </div>

        <form class="form" action="/go" method="post" onsubmit="return handleSubmit(event)">
          <input id="q" type="text" name="q" autocomplete="on"
                 placeholder="URL または 検索語（例: https://example.com / 琵琶湖 観光 / 動画 テスト）" />
          <button type="submit">いってみる ✨</button>
        </form>

        <div class="chips">
          <div class="chip" onclick="quick('https://ja.wikipedia.org')">📚 Wikipedia</div>
          <div class="chip" onclick="quick('ニュース')">🗞 ニュース</div>
          <div class="chip" onclick="quick('動画 テスト')">🎬 動画テスト</div>
          <div class="chip" onclick="quick('https://developer.mozilla.org')">🛠 MDN</div>
        </div>

        <p class="hint">
          注意: DRMや強いBot対策/ログイン必須のサービスは、プロキシ仕様上うまく動かない場合があります。<br/>
          通常のWebサイト・画像・MP4/HLS・検索はこのまま使えます。
        </p>
      </section>
    </div>
  </main>

  <footer>
    © <span id="year"></span> Haruki. All rights reserved.
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    function quick(text){ const el = document.getElementById('q'); el.value = text; el.focus(); }
    function handleSubmit(e){
      const el = document.getElementById('q'); const v = (el.value || '').trim();
      if(!v){ el.focus(); return false; }
      const looksLikeUrl = /^\w+:\/\//i.test(v) || (v.includes('.') && !v.includes(' '));
      if(looksLikeUrl && !/^\w+:\/\//i.test(v)){ el.value = 'https://' + v; }
      return true;
    }
  </script>
</body>
</html>
